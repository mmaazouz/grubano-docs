name: Auto-update docs

# Regenerates the auto-doc artefacts from three sources:
#   1. API reference + changelog        (from the kitchen-hub code)
#   2. Harmonized FR feature guide pages (from code + Notion règlement
#                                         + cerveau + inbox)
#   3. (HELD) Translations of EN source to fr/es/ar/it via Claude API
#
# Triggers:
#   - Nightly at 02:00 UTC   → catches Notion (règlement/cerveau/inbox)
#                              changes even when code didn't move.
#   - repository_dispatch    → fired by grubano-kitchen-hub after a
#     (event_type: app-updated) successful production deploy.
#   - Manual run from the Actions tab.
#
# Required secrets:
#   APP_REPO_TOKEN     — PAT with read access to grubano-kitchen-hub
#                        (omit to fall back to GITHUB_TOKEN if the source
#                        repo is public — it is, today).
#   ANTHROPIC_API_KEY  — Claude API key for the harmonized feature-page
#                        generator (and, later, the held translation pass).
#                        Required to regenerate sensitivity-changed pages;
#                        if absent, only the API ref + changelog refresh.
#   NOTION_TOKEN       — Notion API token with read access to the inbox,
#                        règlement and cerveau pages. Required for the
#                        harmonized generator (use --refresh-notion).

on:
  schedule:
    - cron: '0 2 * * *'
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-docs
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          path: grubano-docs

      - name: Checkout main app repo
        uses: actions/checkout@v4
        with:
          repository: mmaazouz/grubano-kitchen-hub
          # IMPORTANT: the Grubano operator app (Next.js, with app/api/**) lives
          # on `develop`. The `main` branch of that repo currently carries an
          # unrelated Vite scaffold — cloning main produces no app/api and the
          # generator throws. See repo's CLAUDE.md: "all work goes to develop;
          # main is merged from develop only when staging is verified".
          ref: develop
          token: ${{ secrets.APP_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          path: grubano-kitchen-hub
          fetch-depth: 50 # enough history for the changelog

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: grubano-docs/package-lock.json

      - name: Install docs deps
        working-directory: grubano-docs
        run: npm ci

      - name: Generate English source (API + changelog)
        working-directory: grubano-docs
        env:
          APP_REPO_PATH: ${{ github.workspace }}/grubano-kitchen-hub
        run: node scripts/generate-from-source.js

      # ── Harmonized feature pages (B2 — autonomous) ───────────────────────
      # Reads 3 sources (code + Notion règlement + cerveau + inbox), refreshes
      # the .notion-cache/, then regenerates only the topics whose sourceHash
      # changed (sensitivity update). Built-in 429-backoff lets `--all` pace
      # itself across the 30 k-token-per-minute rate window. continue-on-error
      # so a transient Claude/Notion hiccup doesn't fail the whole workflow —
      # the API ref + changelog from the previous step still ship.
      - name: Generate harmonized feature pages
        id: feature-pages
        working-directory: grubano-docs
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: true
        env:
          APP_REPO_PATH: ${{ github.workspace }}/grubano-kitchen-hub
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/generate-feature-page.js --all --refresh-notion

      - name: Note harmonized generator is gated on ANTHROPIC_API_KEY
        if: env.ANTHROPIC_API_KEY == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY secret is not set on this repo."
          echo "Harmonized feature-page generation skipped this run."

      # ── Translation pass (reactivated — GROS LOT étape E) ───────────────
      # api/changelog: EN → fr/es/ar/it · guides + racine: FR → en/es/ar/it.
      # Idempotent via sourceHash — only files whose source changed cost API
      # calls. Skipped cleanly when the ANTHROPIC_API_KEY secret is absent.
      - name: Translate (guides FR→en/es/ar/it · api/changelog EN→fr/es/ar/it)
        id: translate
        working-directory: grubano-docs
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret is not set — translation skipped."
          else
            node scripts/translate-content.js
          fi

      - name: Commit & push if changed
        working-directory: grubano-docs
        run: |
          git config user.name  "grubano-docs-bot"
          git config user.email "bot@grubano.com"
          # Stage everything the generator (and, when D3·7 reactivates it,
          # the translator) writes under content/. `-A` picks up additions,
          # modifications and deletions across content/en + any future
          # content/{fr,es,ar,it} locale dirs.
          #
          # NOTE: the previous form `git add -- content/en content/fr content/es
          # content/ar content/it` silently failed because `git add` with a
          # missing pathspec aborts the whole add and stages nothing — the
          # `2>/dev/null || true` masked it, so the workflow was reporting
          # "No documentation changes to commit" even when the generator had
          # written new MDX files.
          git add -A -- content/
          if git diff --staged --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          echo "Staging $(git diff --staged --name-only | wc -l) file(s)."
          SRC_SHA="${{ github.event.client_payload.sha }}"
          if [ -n "$SRC_SHA" ]; then
            SHORT="${SRC_SHA:0:7}"
            MSG="docs: auto-update from grubano-kitchen-hub@${SHORT} [skip ci]"
          else
            MSG="docs: auto-update API reference + changelog [skip ci]"
          fi
          git commit -m "$MSG"
          git push origin main
