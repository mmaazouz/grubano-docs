<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Grubano">
  <!-- Grubano "G" mark — orange #F97316 on a transparent background.
       No square / no plate behind the letter so the mark sits cleanly in any
       browser tab on either light or dark themes.

       Rendered as <text> with a generic sans-serif stack: sharp (build-time
       PNG/ICO rasterisation via librsvg) and modern browsers (live SVG
       rendering) both resolve "Arial, …, sans-serif" to a close-to-Arial
       glyph, which gives a consistent shape across surfaces. -->
  <text
    x="32"
    y="50"
    font-family="Arial, Helvetica, 'Segoe UI', sans-serif"
    font-size="56"
    font-weight="900"
    fill="#F97316"
    text-anchor="middle"
  >G</text>
</svg>
